openapi: 3.0.3
info:
  title: EchoValue API
  description: 'Serverless key-value storage and wallet management.

    Each `api` call costs 1 wallet token. `token` info requests also cost tokens.
    Log requests are free.

    Empty wallets return **402 Payment Required**.

    '
  version: 1.0.0
  contact:
    name: EchoValue
    url: https://docs.echovalue.dev
tags:
- name: KV API
  description: Read/write/delete key-value entries (each call costs 1 token)
- name: Token API
  description: Wallet creation, balance, logs, and recharge links
- name: Webhook API
  description: Manage multiple webhooks per wallet (each call costs 1 token)
- name: Webhook Test API
  description: Test your configured webhook with a dummy payload (costs 1 token)
- name: URL To Metadata API
  description: Analyze a URL and return extracted metadata
- name: My IP API
  description: Return the caller IP and geo headers (costs 1 token)
components:
  securitySchemes:
    TokenAuth:
      type: apiKey
      in: header
      name: X-Token
      description: Wallet ID (minimum 10 characters)
  headers:
    XBalance:
      description: Wallet balance after the request, when the endpoint emits balance
        headers.
      schema:
        type: integer
        example: 42
    XCost:
      description: 'Tokens charged for the request, when the endpoint emits cost headers.

        For free endpoints such as `GET /token/logs`, this value is `0`.

        '
      schema:
        type: integer
        example: 1
  parameters:
    TokenHeader:
      name: X-Token
      in: header
      required: true
      schema:
        type: string
        minLength: 10
      description: Wallet ID
    ServiceAuthHeader:
      name: X-Service-Key
      in: header
      required: true
      schema:
        type: string
      description: Shared secret for internal service-to-service calls, matched against
        SERVICE_AUTH_KEY (single key or comma-separated list)
    MailboxSecretHeader:
      name: X-Mailbox-Secret
      in: header
      required: true
      schema:
        type: string
      description: Shared secret for call endpoint, matched against MAILBOX_SECRET
        (single key or comma-separated list)
    Bucket:
      name: bucket
      in: path
      required: true
      schema:
        type: string
        maxLength: 30
      description: Bucket name (cannot start with `reserved-` or end with `---`)
    Key:
      name: key
      in: path
      required: true
      schema:
        type: string
        maxLength: 30
      description: Key name
    WebhookId:
      name: webhookId
      in: path
      required: true
      schema:
        type: string
      description: Public webhook identifier
    TTL:
      name: ttl
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 2592000
        default: 2592000
      description: Time-to-live in seconds (0 or missing = max 30 days)
    ServiceToken:
      name: token
      in: query
      required: true
      schema:
        type: string
      description: Wallet ID
    RechargeValue:
      name: value
      in: query
      required: true
      schema:
        type: integer
        minimum: 1
      description: Number of tokens to add
    ServiceHash:
      name: hash
      in: query
      required: false
      schema:
        type: string
      description: SHA256 hash of the wallet ID. Use instead of `token` when the caller
        should not know the raw wallet ID.
  schemas:
    MyIPInfo:
      type: object
      properties:
        ip:
          type: string
          description: IPv4 address when available. Empty for native IPv6 callers.
        ipv6:
          type: string
          description: Raw IPv6 address when the current caller IP is IPv6.
        isCurrentIpv6:
          type: boolean
          description: True when the incoming client IP header contains an IPv6 address.
        userAgent:
          type: string
        acceptLanguage:
          type: string
        city:
          type: string
        country:
          type: string
        continent:
          type: string
        latitude:
          type: string
        longitude:
          type: string
        region:
          type: string
        regionCode:
          type: string
        timezone:
          type: string
        postalCode:
          type: string
    SummaryRequest:
      type: object
      description: 'Request body for URL metadata analysis.

        '
      required:
      - url
      additionalProperties: false
      properties:
        url:
          type: string
          format: uri
          description: Absolute URL to analyze.
          example: https://example.com/articles/launch
        aiSummary:
          type: string
          enum:
          - none
          - short
          - medium
          - long
          default: none
          description: 'Controls AI enrichment level.

            `none` disables AI summary generation and key-fact extraction.

            `short`, `medium`, and `long` enable both and request an approximate summary
            length of 50, 150, and 300 words respectively.

            '
          example: none
      example:
        url: https://example.com/articles/launch
        aiSummary: none
    SummaryResponse:
      type: object
      description: 'Metadata extracted from the requested URL.

        Response fields may vary depending on the analyzed page.

        '
      additionalProperties: true
      example:
        success: true
        data:
          seo:
            title: Example Company - Leading SaaS Platform
            description: Enterprise software for team collaboration
            keywords:
            - saas
            - collaboration
            - enterprise
            canonical: https://example.com
          social:
            x: https://x.com/exampleco
            linkedin: https://linkedin.com/company/exampleco
          contact:
            email: hello@example.com
            phone: +1-555-0123
          technical:
            statusCode: 200
            finalUrl: https://example.com
            originalUrl: https://example.com
            robotsAllowed: true
            isSecure: true
            contentType: text/html; charset=utf-8
          links:
            internal:
              total: 12
              urls:
              - /about
              - /pricing
              - /contact
            external:
              total: 5
              urls:
              - https://github.com/example
              domains:
              - github.com
          ai:
            summary:
              short: Example Company provides cloud-based collaboration software for
                enterprises, offering project management and team communication tools.
              medium: Example Company is a leading SaaS platform offering comprehensive
                team collaboration tools designed for enterprise organizations. The
                platform combines project management, document sharing, and real-time
                communication features to help teams work more efficiently. With over
                10,000 customers worldwide, Example Company has established itself
                as a trusted solution for businesses looking to improve productivity
                and streamline workflows.
              long: Example Company is an innovative SaaS provider that has been transforming
                enterprise collaboration since 2015. Based in San Francisco, the company
                offers a comprehensive suite of tools designed to help teams communicate,
                collaborate, and manage projects more effectively. The platform integrates
                seamlessly with popular business applications and provides enterprise-grade
                security features. Example Company serves organizations of all sizes,
                from startups to Fortune 500 companies, with a particular focus on
                technology, finance, and healthcare sectors. The company's mission
                is to make workplace collaboration simple, efficient, and enjoyable
                for everyone.
              contentLength: 5240
              truncated: false
            keyFacts:
              companyName: Example Company Inc.
              companyType: B2B SaaS
              industry: Enterprise Software
              services:
              - Team Collaboration
              - Project Management
              - Document Sharing
              - Real-time Communication
              targetAudience: Enterprise teams and organizations
              businessModel: Subscription
              headquarters: San Francisco, CA
              foundedYear: 2015
              keyFeatures:
              - Real-time collaboration
              - Enterprise security
              - Third-party integrations
              - Mobile apps
            processingTime: 2340
        timestamp: '2025-06-19T15:54:01.821Z'
    WalletInfo:
      type: object
      properties:
        wallet:
          type: integer
          description: Current token balance
        created:
          type: string
          format: date-time
          description: Wallet creation timestamp
        hash:
          type: string
          description: SHA256 hash of the wallet token (used for identification in
            webhook payloads)
    CustomerSettings:
      type: object
      properties:
        low_balance_threshold:
          type: integer
          minimum: 0
          description: Wallet balance threshold that triggers low balance notifications.
            Set to 0 to disable notifications.
        low_balance_webhook:
          $ref: '#/components/schemas/LowBalanceWebhookConfig'
        low_balance_email:
          type: string
          format: email
          description: Email address to receive low balance notifications.
    LowBalanceWebhookConfig:
      type: object
      description: Webhook configuration for low balance notifications
      required:
      - url
      properties:
        url:
          type: string
          format: uri
          description: HTTPS URL to receive webhook when balance falls below threshold.
            Must be a valid HTTPS URL.
        headers:
          type: object
          additionalProperties:
            type: string
          description: Optional custom headers to include in the webhook request
        format:
          type: string
          enum:
          - ''
          - slack
          - discord
          - teams
          - telegram
          - pagerduty
          - custom
          description: "Native payload format for the webhook. When set, the payload\
            \ is transformed:\n- `slack` \u2014 `{\"text\": \"...\"}` format\n- `discord`\
            \ \u2014 `{\"content\": \"...\"}` format\n- `teams` \u2014 `{\"text\"\
            : \"...\"}` Adaptive Card text\n- `telegram` \u2014 `{\"chat_id\": \"\
            ...\", \"text\": \"...\", \"parse_mode\": \"HTML\"}` (requires `options.chat_id`)\n\
            - `pagerduty` \u2014 Events API v2 trigger payload (requires `options.routing_key`)\n\
            - `custom` \u2014 user-defined JSON template with placeholders (requires\
            \ `template` field)\n"
        template:
          type: object
          description: JSON template when `format` is `custom`. Supports `{{wallet}}`,
            `{{threshold}}`, `{{token_hash}}` placeholders.
          additionalProperties: true
        options:
          type: object
          additionalProperties:
            type: string
          description: Format-specific options (e.g., `chat_id` for Telegram, `routing_key`
            for PagerDuty)
    LogEntry:
      type: object
      properties:
        id:
          type: string
        method:
          type: string
        path:
          type: string
          description: Full request path including query parameters
        endpoint:
          type: string
          description: API category (e.g. `kv`, `token`, `webhook`, `service`, `manage`)
        status_code:
          type: integer
          description: HTTP response status code
        response_time_ms:
          type: integer
          description: Response time in milliseconds
        error:
          type: string
        timestamp:
          type: string
          format: date-time
        expiration:
          type: string
          format: date-time
        cost:
          type: integer
        balance:
          type: integer
    LogsResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: '#/components/schemas/LogEntry'
        n:
          type: integer
          description: Number of log entries returned
    CallInboundPayload:
      type: object
      required:
      - to
      properties:
        externalMessageId:
          type: string
          description: Message identifier from the inbound mail provider
        receivedAt:
          type: string
          description: ISO-8601 timestamp when the message was received
        from:
          type: object
          description: Sender information
          additionalProperties: true
        to:
          type: array
          description: Recipient list from the inbound mail provider
          items:
            type: object
            required:
            - email
            properties:
              email:
                type: string
              name:
                type: string
        cc:
          type: array
          description: CC recipients from the inbound mail provider
          items:
            type: object
            additionalProperties: true
        subject:
          type: string
        text:
          type: string
        html:
          type: string
        headers:
          type: object
          additionalProperties: true
        attachments:
          type: array
          items:
            type: object
            additionalProperties: true
        url:
          type: string
        provider:
          type: string
        raw:
          type: object
          additionalProperties: true
    CallResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Whether the webhook was successfully called
        message:
          type: string
          description: The target address
    TestResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Whether the test webhook was successfully delivered
        message:
          type: string
          description: Confirmation message
    WebhookCreateReplaceRequest:
      type: object
      required:
      - url
      properties:
        webhookId:
          type: string
          description: Public webhook identifier used for management endpoints. Defaults
            to `default` when omitted.
        url:
          type: string
          description: Callback URL to receive webhook events
        headers:
          type: object
          additionalProperties:
            type: string
          description: Optional custom headers to include in the callback request
        format:
          type: string
          enum:
          - ''
          - slack
          - discord
          - teams
          - telegram
          - pagerduty
          - custom
          description: "Native payload format. When set, the webhook body is transformed\
            \ into the platform's native message format instead of forwarding the\
            \ raw email payload.\n- `slack` \u2014 `{\"text\": \"...\"}` with bold\
            \ subject and From\n- `discord` \u2014 `{\"content\": \"...\"}` with bold\
            \ subject and From\n- `teams` \u2014 `{\"text\": \"...\"}` Adaptive Card\
            \ text\n- `telegram` \u2014 `{\"chat_id\": \"...\", \"text\": \"...\"\
            , \"parse_mode\": \"HTML\"}` (requires `options.chat_id`)\n- `pagerduty`\
            \ \u2014 Events API v2 trigger payload (requires `options.routing_key`)\n\
            - `custom` \u2014 user-defined JSON template with placeholders (requires\
            \ `template` field)\n"
        template:
          type: object
          description: 'JSON template used when `format` is `custom`. Supports placeholders:

            - Dot notation: `{{from.name}}`, `{{subject}}`

            - Array index: `{{attachments[0].filename}}`, `{{attachments[-1].filename}}`
            (negative = from end)

            - Fallback chain: `{{text|html}}` (first non-empty wins)

            - Literal fallback: `{{sender|"unknown"}}`

            Max 2048 bytes, max 5 nesting levels.

            '
          additionalProperties: true
        options:
          type: object
          additionalProperties:
            type: string
          description: "Format-specific options (max 10 keys, values up to 500 chars\
            \ each).\n- `chat_id` \u2014 required for `telegram` format\n- `routing_key`\
            \ \u2014 required for `pagerduty` format\n"
        includeAttachments:
          type: boolean
          default: true
          description: Whether to include email attachments in the webhook payload.
            If false, attachments are stripped from the payload. When email contains
            attachments, costs 5 tokens; without attachments costs 2 tokens.
      additionalProperties: false
    WebhookPatchRequest:
      type: object
      description: 'Partial update payload for `PATCH /webhook/{webhookId}`.

        Only provided fields are updated.

        `headers`, `options`, and `template` replace the full field value (no deep
        merge).

        '
      properties:
        url:
          type: string
        headers:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Set `{}` to clear all headers.
        format:
          type: string
          enum:
          - ''
          - slack
          - discord
          - teams
          - telegram
          - pagerduty
          - custom
        template:
          type: object
          nullable: true
          additionalProperties: true
          description: Set `null` to remove template.
        options:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Set `{}` to clear all options.
        includeAttachments:
          type: boolean
      additionalProperties: false
    WebhookResponse:
      type: object
      properties:
        webhookId:
          type: string
          description: Public webhook identifier used for management endpoints
        webhook:
          type: string
          description: Configured callback URL
        headers:
          type: object
          additionalProperties:
            type: string
          description: Custom headers
        format:
          type: string
          description: Native format, if configured (e.g. `slack`, `telegram`, `custom`)
        template:
          type: object
          description: Custom template object (only present when format is `custom`)
        options:
          type: object
          additionalProperties:
            type: string
          description: Format options with sensitive values redacted
        includeAttachments:
          type: boolean
          description: Whether attachments are included in webhook payload (true =
            include, false = stripped)
        email:
          type: string
          description: Opaque mailbox address for this webhook (<mailboxId>@hook.echovalue.dev)
        hash:
          type: string
          description: SHA256 hash of the wallet token
    WebhookListResponse:
      type: object
      properties:
        webhooks:
          type: array
          items:
            $ref: '#/components/schemas/WebhookResponse'
  responses:
    Unauthorized:
      description: Missing or invalid X-Token header (min 10 chars)
    PaymentRequired:
      description: Wallet has insufficient tokens for the requested operation.
    NotFound:
      description: Key not found or expired
    BadRequest:
      description: Invalid parameters
paths:
  /kv/{bucket}/{key}:
    servers:
    - url: https://api.echovalue.dev
      description: Production - Consolidated API
    get:
      tags:
      - KV API
      operationId: getKVValue
      summary: Get value
      description: Returns the stored value for the given bucket/key. Costs 1 token.
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      - $ref: '#/components/parameters/Bucket'
      - $ref: '#/components/parameters/Key'
      responses:
        '200':
          description: The stored value
          content:
            text/plain:
              schema:
                type: string
          headers:
            X-Balance:
              $ref: '#/components/headers/XBalance'
            X-Cost:
              $ref: '#/components/headers/XCost'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
      - KV API
      operationId: storeKVValue
      summary: Store value
      description: Stores a raw body value with TTL. Costs 1 token.
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      - $ref: '#/components/parameters/Bucket'
      - $ref: '#/components/parameters/Key'
      - $ref: '#/components/parameters/TTL'
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              maxLength: 1000
      responses:
        '200':
          description: Value stored successfully
          content:
            text/plain:
              schema:
                type: string
                example: OK
          headers:
            X-Balance:
              $ref: '#/components/headers/XBalance'
            X-Cost:
              $ref: '#/components/headers/XCost'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/PaymentRequired'
    delete:
      tags:
      - KV API
      operationId: deleteKVValue
      summary: Delete key
      description: Deletes the key from the bucket. Costs 1 token.
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      - $ref: '#/components/parameters/Bucket'
      - $ref: '#/components/parameters/Key'
      responses:
        '200':
          description: Key deleted
          content:
            text/plain:
              schema:
                type: string
                example: OK
          headers:
            X-Balance:
              $ref: '#/components/headers/XBalance'
            X-Cost:
              $ref: '#/components/headers/XCost'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/PaymentRequired'
  /token:
    servers:
    - url: https://api.echovalue.dev
      description: Production - Consolidated API
    get:
      tags:
      - Token API
      operationId: getWalletInfo
      summary: Get wallet info
      description: Returns wallet JSON. Costs 1 token.
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      responses:
        '200':
          description: Wallet info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletInfo'
          headers:
            X-Balance:
              $ref: '#/components/headers/XBalance'
            X-Cost:
              $ref: '#/components/headers/XCost'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/PaymentRequired'
    post:
      tags:
      - Token API
      operationId: createWallet
      summary: Create wallet
      description: "- `token=new` \u2014 creates a new wallet with DEFAULT_WALLET\
        \ credits, returns wallet ID\n"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - token
              properties:
                token:
                  type: string
                  enum:
                  - new
                  description: Action to perform
      responses:
        '200':
          description: Wallet ID string
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: Bad request
  /recharge:
    servers:
    - url: https://api.echovalue.dev
      description: Production - Token API
    get:
      tags:
      - Token API
      operationId: getRechargeLink
      summary: Get recharge link
      description: Returns a Stripe checkout link with the wallet hash in `client_reference_id`.
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      - name: amount
        in: query
        required: false
        schema:
          type: string
          enum:
          - '1'
          - '3'
          default: '1'
        description: Recharge tier
      responses:
        '200':
          description: Stripe checkout URL
          content:
            text/plain:
              schema:
                type: string
          headers:
            X-Balance:
              $ref: '#/components/headers/XBalance'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          description: Method not allowed
  /token/logs:
    servers:
    - url: https://api.echovalue.dev
      description: Production - Consolidated API
    get:
      tags:
      - Token API
      operationId: getWalletLogs
      summary: Get request logs
      description: Returns the latest `n` log entries. This endpoint is free and does
        not deduct wallet balance.
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      - name: n
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 5
        description: Number of log entries to return
      - name: type
        in: query
        required: false
        schema:
          type: string
        description: 'Optional endpoint filter. The implementation forwards this value
          to log storage as-is.

          Common values include `kv`, `token`, `settings`, `webhook`, `url-to-metadata`,
          `myip`, `service`, and `manage`.

          '
      responses:
        '200':
          description: Log entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogsResponse'
          headers:
            X-Cost:
              $ref: '#/components/headers/XCost'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /token/settings:
    servers:
    - url: https://api.echovalue.dev
      description: Production - Consolidated API
    get:
      tags:
      - Token API
      operationId: getWalletSettings
      summary: Get low balance settings
      description: Returns the current low balance notification settings. Costs 1
        token.
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      responses:
        '200':
          description: Low balance settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerSettings'
          headers:
            X-Balance:
              $ref: '#/components/headers/XBalance'
            X-Cost:
              $ref: '#/components/headers/XCost'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/PaymentRequired'
    put:
      tags:
      - Token API
      operationId: updateWalletSettings
      summary: Update low balance settings
      description: 'Configures low balance notifications. When wallet balance falls
        below the threshold,

        a notification is sent to the configured webhook URL and/or email.

        Notifications are sent at most once per low-balance incident (i.e. the cooldown
        resets when the balance rises back above the threshold).

        Costs 1 token.

        '
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerSettings'
      responses:
        '200':
          description: Settings updated successfully
          content:
            text/plain:
              schema:
                type: string
                example: OK
          headers:
            X-Balance:
              $ref: '#/components/headers/XBalance'
            X-Cost:
              $ref: '#/components/headers/XCost'
        '400':
          description: Invalid webhook URL (must be HTTPS) or invalid threshold value
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/PaymentRequired'
  /webhook:
    servers:
    - url: https://api.echovalue.dev
      description: Production - Consolidated API
    get:
      tags:
      - Webhook API
      operationId: listWebhooks
      summary: List webhooks
      description: Returns all configured webhooks for this wallet. Costs 1 token.
