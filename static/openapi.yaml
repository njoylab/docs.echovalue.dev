openapi: "3.0.3"
info:
  title: EchoValue API
  description: |
    Serverless key-value storage and wallet management.
    Each `api` call costs 1 wallet token. `token` info requests also cost tokens. Log requests are free.
    Empty wallets return **402 Payment Required**.
  version: "1.0.0"
  contact:
    name: EchoValue
    url: https://docs.echovalue.dev

tags:
  - name: KV API
    description: Read/write/delete key-value entries (each call costs 1 token)
  - name: Token API
    description: Wallet creation, balance, logs, and recharge links
  - name: Webhook API
    description: Manage multiple webhooks per wallet (each call costs 1 token)
  - name: Webhook Test API
    description: Test your configured webhook with a dummy payload (costs 1 token)

components:
  securitySchemes:
    TokenAuth:
      type: apiKey
      in: header
      name: X-Token
      description: Wallet ID (minimum 10 characters)

  parameters:
    TokenHeader:
      name: X-Token
      in: header
      required: true
      schema:
        type: string
        minLength: 10
      description: Wallet ID

    ServiceAuthHeader:
      name: X-Service-Key
      in: header
      required: true
      schema:
        type: string
      description: Shared secret for internal service-to-service calls, matched against SERVICE_AUTH_KEY (single key or comma-separated list)

    MailboxSecretHeader:
      name: X-Mailbox-Secret
      in: header
      required: true
      schema:
        type: string
      description: Shared secret for call endpoint, matched against MAILBOX_SECRET (single key or comma-separated list)

    Bucket:
      name: bucket
      in: path
      required: true
      schema:
        type: string
        maxLength: 30
      description: Bucket name (cannot start with `reserved-` or end with `---`)

    Key:
      name: key
      in: path
      required: true
      schema:
        type: string
        maxLength: 30
      description: Key name

    TTL:
      name: ttl
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 2592000
        default: 2592000
      description: Time-to-live in seconds (0 or missing = max 30 days)

    ServiceToken:
      name: token
      in: query
      required: true
      schema:
        type: string
      description: Wallet ID

    RechargeValue:
      name: value
      in: query
      required: true
      schema:
        type: integer
        minimum: 1
      description: Number of tokens to add

  schemas:
    WalletInfo:
      type: object
      properties:
        wallet:
          type: integer
          description: Current token balance
        created:
          type: string
          format: date-time
          description: Wallet creation timestamp
        hash:
          type: string
          description: SHA256 hash of the wallet token (used for identification in webhook payloads)

    CustomerSettings:
      type: object
      properties:
        low_balance_threshold:
          type: integer
          minimum: 0
          description: Wallet balance threshold that triggers low balance notifications. Set to 0 to disable notifications.
        low_balance_webhook:
          $ref: "#/components/schemas/LowBalanceWebhookConfig"
        low_balance_email:
          type: string
          format: email
          description: Email address to receive low balance notifications.

    LowBalanceWebhookConfig:
      type: object
      description: Webhook configuration for low balance notifications
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: HTTPS URL to receive webhook when balance falls below threshold. Must be a valid HTTPS URL.
        headers:
          type: object
          additionalProperties:
            type: string
          description: Optional custom headers to include in the webhook request
        format:
          type: string
          enum: ["", "slack", "discord", "teams", "telegram", "custom"]
          description: |
            Native payload format for the webhook. When set, the payload is transformed:
            - `slack` — `{"text": "..."}` format
            - `discord` — `{"content": "..."}` format
            - `teams` — `{"text": "..."}` Adaptive Card text
            - `telegram` — `{"chat_id": "...", "text": "...", "parse_mode": "HTML"}` (requires `options.chat_id`)
            - `custom` — user-defined JSON template with placeholders (requires `template` field)
        template:
          type: object
          description: JSON template when `format` is `custom`. Supports `{{wallet}}`, `{{threshold}}`, `{{token_hash}}` placeholders.
          additionalProperties: true
        options:
          type: object
          additionalProperties:
            type: string
          description: Format-specific options (e.g., `chat_id` for Telegram)

    LogEntry:
      type: object
      properties:
        id:
          type: string
        method:
          type: string
        path:
          type: string
          description: Full request path including query parameters
        endpoint:
          type: string
          description: API category (e.g. `kv`, `token`, `webhook`, `service`, `manage`)
        status_code:
          type: integer
          description: HTTP response status code
        response_time_ms:
          type: integer
          description: Response time in milliseconds
        error:
          type: string
        timestamp:
          type: string
          format: date-time
        expiration:
          type: string
          format: date-time
        cost:
          type: integer
        balance:
          type: integer

    LogsResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"
        n:
          type: integer
          description: Number of log entries returned

    TestResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Whether the test webhook was successfully delivered
        message:
          type: string
          description: Confirmation message

    WebhookRequest:
      type: object
      required: [url]
      properties:
        mailboxId:
          type: string
          description: Opaque mailbox identifier. Omit on create, include on update.
        name:
          type: string
          description: Human-friendly webhook name. Optional on create/update.
        url:
          type: string
          description: Callback URL to receive webhook events
        headers:
          type: object
          additionalProperties:
            type: string
          description: Optional custom headers to include in the callback request
        format:
          type: string
          enum: ["", "slack", "discord", "teams", "telegram", "pagerduty", "custom"]
          description: |
            Native payload format. When set, the webhook body is transformed into the platform's native message format instead of forwarding the raw email payload.
            - `slack` — `{"text": "..."}` with bold subject and From
            - `discord` — `{"content": "..."}` with bold subject and From
            - `teams` — `{"text": "..."}` Adaptive Card text
            - `telegram` — `{"chat_id": "...", "text": "...", "parse_mode": "HTML"}` (requires `options.chat_id`)
            - `pagerduty` — Events API v2 trigger payload (requires `options.routing_key`)
            - `custom` — user-defined JSON template with placeholders (requires `template` field)
        template:
          type: object
          description: |
            JSON template used when `format` is `custom`. Supports placeholders:
            - Dot notation: `{{from.name}}`, `{{subject}}`
            - Array index: `{{attachments[0].filename}}`, `{{attachments[-1].filename}}` (negative = from end)
            - Fallback chain: `{{text|html}}` (first non-empty wins)
            - Literal fallback: `{{sender|"unknown"}}`
            Max 2048 bytes, max 5 nesting levels.
          additionalProperties: true
        options:
          type: object
          additionalProperties:
            type: string
          description: |
            Format-specific options (max 10 keys, values up to 500 chars each).
            - `chat_id` — required for `telegram` format
            - `routing_key` — required for `pagerduty` format
        includeAttachments:
          type: boolean
          default: true
          description: Whether to include email attachments in the webhook payload. If false, attachments are stripped from the payload. When email contains attachments, costs 5 tokens; without attachments costs 2 tokens.

    WebhookResponse:
      type: object
      properties:
        name:
          type: string
          description: Webhook name
        webhook:
          type: string
          description: Configured callback URL
        headers:
          type: object
          additionalProperties:
            type: string
          description: Custom headers
        format:
          type: string
          description: Native format, if configured (e.g. `slack`, `telegram`, `custom`)
        template:
          type: object
          description: Custom template object (only present when format is `custom`)
        options:
          type: object
          additionalProperties:
            type: string
          description: Format options with sensitive values redacted
        includeAttachments:
          type: boolean
          description: Whether attachments are included in webhook payload (true = include, false = stripped)
        mailboxId:
          type: string
          description: Opaque mailbox identifier for management operations
        email:
          type: string
          description: Opaque mailbox address for this webhook (<mailboxId>@hook.echovalue.dev)
        hash:
          type: string
          description: SHA256 hash of the wallet token

    WebhookListResponse:
      type: object
      properties:
        webhooks:
          type: array
          items:
            $ref: "#/components/schemas/WebhookResponse"

  responses:
    Unauthorized:
      description: Missing or invalid X-Token header (min 10 chars)
    PaymentRequired:
      description: Wallet has 0 tokens. Recharge at https://docs.echovalue.dev/#wallet-recharge
    NotFound:
      description: Key not found or expired
    BadRequest:
      description: Invalid parameters

paths:
  # ─────────────────────────────── KV API ───────────────────────────────
  /kv/{bucket}/{key}:
    servers:
      - url: https://api.echovalue.dev
        description: Production - Consolidated API
      - url: https://dev-api.echovalue.dev
        description: Development - Consolidated API
    get:
      tags: [KV API]
      summary: Get value
      description: Returns the stored value for the given bucket/key. Costs 1 token.
      security:
        - TokenAuth: []
      parameters:
        - $ref: "#/components/parameters/TokenHeader"
        - $ref: "#/components/parameters/Bucket"
        - $ref: "#/components/parameters/Key"
      responses:
        "200":
          description: The stored value
          content:
            text/plain:
              schema:
                type: string
          headers:
            X-Balance:
              schema:
                type: integer
              description: Wallet balance after this call
            X-Cost:
              schema:
                type: integer
              description: Tokens consumed (1)
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [KV API]
      summary: Store value
      description: Stores a raw body value with TTL. Costs 1 token.
      security:
        - TokenAuth: []
      parameters:
        - $ref: "#/components/parameters/TokenHeader"
        - $ref: "#/components/parameters/Bucket"
        - $ref: "#/components/parameters/Key"
        - $ref: "#/components/parameters/TTL"
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              maxLength: 1000
      responses:
        "200":
          description: Value stored successfully
          content:
            text/plain:
              schema:
                type: string
                example: "OK"
          headers:
            X-Balance:
              schema:
                type: integer
            X-Cost:
              schema:
                type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"

    delete:
      tags: [KV API]
      summary: Delete key
      description: Deletes the key from the bucket. Costs 1 token.
      security:
        - TokenAuth: []
      parameters:
        - $ref: "#/components/parameters/TokenHeader"
        - $ref: "#/components/parameters/Bucket"
        - $ref: "#/components/parameters/Key"
      responses:
        "200":
          description: Key deleted
          content:
            text/plain:
              schema:
                type: string
                example: "OK"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"

  # ─────────────────────────────── Token API ───────────────────────────────
  /token:
    servers:
      - url: https://api.echovalue.dev
        description: Production - Consolidated API
      - url: https://dev-api.echovalue.dev
        description: Development - Consolidated API
    get:
      tags: [Token API]
      summary: Get wallet info
      description: Returns wallet JSON. Costs 1 token.
      security:
        - TokenAuth: []
      parameters:
        - $ref: "#/components/parameters/TokenHeader"
      responses:
        "200":
          description: Wallet info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletInfo"
          headers:
            X-Balance:
              schema:
                type: integer
            X-Cost:
              schema:
                type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"

    post:
      tags: [Token API]
      summary: Create wallet
      description: |
        - `token=new` — creates a new wallet with DEFAULT_WALLET credits, returns wallet ID
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  enum: [new]
                  description: Action to perform
      responses:
        "200":
          description: Wallet ID string
          content:
            text/plain:
              schema:
                type: string
        "400":
          description: Bad request

  /recharge:
    servers:
      - url: https://api.echovalue.dev
        description: Production - Token API
      - url: https://dev-api.echovalue.dev
        description: Development - Token API
    get:
      tags: [Token API]
      summary: Get recharge link
      description: returns a Stripe checkout link
      security:
        - TokenAuth: []
      parameters:
        - $ref: "#/components/parameters/TokenHeader"
        - name: amount
          in: query
          required: false
          schema:
            type: string
            enum: ["1", "3"]
            default: "1"
          description: Recharge tier
      responses:
        "200":
          description: Stripe checkout URL
          content:
            text/plain:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "405":
          description: Method not allowed

  /token/logs:
    servers:
      - url: https://api.echovalue.dev
        description: Production - Consolidated API
      - url: https://dev-api.echovalue.dev
        description: Development - Consolidated API
    get:
      tags: [Token API]
      summary: Get request logs
      description: Returns the latest n log entries. Free endpoint.
      security:
        - TokenAuth: []
      parameters:
        - $ref: "#/components/parameters/TokenHeader"
        - name: n
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 5
          description: Number of log entries to return
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [kv, webhook, token, service]
          description: Filter logs by endpoint type. If omitted, returns all logs.
      responses:
        "200":
          description: Log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /token/settings:
    servers:
      - url: https://api.echovalue.dev
        description: Production - Consolidated API
      - url: https://dev-api.echovalue.dev
        description: Development - Consolidated API
    get:
      tags: [Token API]
      summary: Get low balance settings
      description: Returns the current low balance notification settings. Costs 1 token.
      security:
        - TokenAuth: []
      parameters:
        - $ref: "#/components/parameters/TokenHeader"
      responses:
        "200":
          description: Low balance settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerSettings"
          headers:
            X-Balance:
              schema:
                type: integer
              description: Wallet balance after this call
            X-Cost:
              schema:
                type: integer
                enum: [1]
              description: Costs 1 token
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"

    put:
      tags: [Token API]
      summary: Update low balance settings
      description: |
        Configures low balance notifications. When wallet balance falls below the threshold,
        a notification is sent to the configured webhook URL and/or email.
        Notifications are sent at most once every 24 hours per wallet.
        Costs 1 token.
      security:
        - TokenAuth: []
      parameters:
        - $ref: "#/components/parameters/TokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerSettings"
      responses:
        "200":
          description: Settings updated successfully
          content:
            text/plain:
              schema:
                type: string
                example: "OK"
          headers:
            X-Balance:
              schema:
                type: integer
              description: Wallet balance after this call
            X-Cost:
              schema:
                type: integer
                enum: [1]
              description: Tokens consumed (1)
        "400":
          description: Invalid webhook URL (must be HTTPS) or invalid threshold value
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"

  # ─────────────────────────────── Webhook API ───────────────────────────────
  /webhook:
    servers:
      - url: https://api.echovalue.dev
        description: Production - Consolidated API
      - url: https://dev-api.echovalue.dev
        description: Development - Consolidated API
    get:
      tags: [Webhook API]
      summary: List webhooks
      description: Returns all configured webhooks for this wallet. Costs 1 token.
      security:
        - TokenAuth: []
      parameters:
        - $ref: "#/components/parameters/TokenHeader"
      responses:
        "200":
          description: Webhook list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookListResponse"
          headers:
            X-Balance:
              schema:
                type: integer
              description: Wallet balance after this call
            X-Cost:
              schema:
                type: integer
              description: Tokens consumed (1)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"

    post:
      tags: [Webhook API]
      summary: Create or update webhook
      description: |
        Creates a new webhook when `mailboxId` is omitted, or updates an existing mailbox-owned webhook when `mailboxId` is provided. Costs 1 token.
        URL must be HTTPS pointing to a public host.
      security:
        - TokenAuth: []
      parameters:
        - $ref: "#/components/parameters/TokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookRequest"
      responses:
        "200":
          description: Webhook saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
          headers:
            X-Balance:
              schema:
                type: integer
            X-Cost:
              schema:
                type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "500":
          description: Internal server error

    delete:
      tags: [Webhook API]
      summary: Delete webhook
      description: Removes a specific webhook. Costs 1 token.
      security:
        - TokenAuth: []
      parameters:
        - $ref: "#/components/parameters/TokenHeader"
        - name: mailboxId
          in: query
          required: true
          schema:
            type: string
          description: Opaque mailbox identifier to delete
      responses:
        "200":
          description: Webhook deleted
          content:
            text/plain:
              schema:
                type: string
                example: "OK"
          headers:
            X-Balance:
              schema:
                type: integer
            X-Cost:
              schema:
                type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "404":
          description: No webhook configured

  # ─────────────────────────────── Webhook Test API ───────────────────────────────
  /webhook/test:
    servers:
      - url: https://api.echovalue.dev
        description: Production - Consolidated API
      - url: https://dev-api.echovalue.dev
        description: Development - Consolidated API
    post:
      tags: [Webhook Test API]
      summary: Test a specific webhook
      description: |
        Sends a dummy payload to the specified webhook URL. Costs 1 token.
      security:
        - TokenAuth: []
      parameters:
        - $ref: "#/components/parameters/TokenHeader"
        - name: mailboxId
          in: query
          required: true
          schema:
            type: string
          description: Opaque mailbox identifier to test
      responses:
        "200":
          description: Test call processed (check `success` field for delivery status)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestResponse"
              examples:
                success:
                  summary: Delivery success
                  value:
                    success: true
                    message: "test webhook delivered"
                failure:
                  summary: Delivery failure
                  value:
                    success: false
                    message: "webhook call failed: context deadline exceeded (Client.Timeout exceeded while awaiting headers)"
          headers:
            X-Balance:
              schema:
                type: integer
              description: Caller wallet balance after this call
            X-Cost:
              schema:
                type: integer
              description: Tokens consumed (1)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "405":
          description: Method not POST
