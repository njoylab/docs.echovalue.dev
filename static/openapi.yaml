openapi: 3.0.3
info:
  title: EchoValue API
  description: 'Serverless key-value storage and wallet management.

    Billable API calls cost wallet credits. Wallet info requests also cost credits.
    Log requests are free.

    Empty wallets return **402 Payment Required**.

    '
  version: 1.0.0
  contact:
    name: EchoValue
    url: https://docs.echovalue.dev
tags:
- name: KV API
  description: Read/write/delete key-value entries (each call costs 1 credit)
- name: Token API
  description: Wallet creation, balance, logs, and recharge links
- name: Webhook API
  description: Manage multiple webhooks per wallet (each call costs 1 credit)
- name: Webhook Test API
  description: Test your configured webhook with a dummy payload (costs 1 credit)
- name: URL To Metadata API
  description: Analyze a URL and return extracted metadata
- name: DNS Lookup API
  description: Run DNS lookup and enrichment against the upstream Lambda
- name: My IP API
  description: Return the caller IP and geo headers (costs 1 credit)
components:
  securitySchemes:
    TokenAuth:
      type: apiKey
      in: header
      name: x-token
      description: Wallet ID (minimum 10 characters)
  headers:
    XBalance:
      description: Wallet balance after the request, when the endpoint emits balance
        headers.
      schema:
        type: integer
        example: 42
    XCost:
      description: 'Credits charged for the request, when the endpoint emits cost
        headers.

        For free endpoints such as `GET /token/logs`, this value is `0`.

        '
      schema:
        type: integer
        example: 1
  parameters:
    TokenHeader:
      name: x-token
      in: header
      required: true
      schema:
        type: string
        minLength: 10
      description: Wallet ID
    ServiceAuthHeader:
      name: x-service-key
      in: header
      required: true
      schema:
        type: string
      description: Shared secret for internal service-to-service calls, matched against
        SERVICE_AUTH_KEY (single key or comma-separated list)
    MailboxSecretHeader:
      name: x-mailbox-secret
      in: header
      required: true
      schema:
        type: string
      description: Shared secret for call endpoint, matched against MAILBOX_SECRET
        (single key or comma-separated list)
    Bucket:
      name: bucket
      in: path
      required: true
      schema:
        type: string
        maxLength: 30
      description: Bucket name (cannot start with `reserved-` or end with `---`)
    Key:
      name: key
      in: path
      required: true
      schema:
        type: string
        maxLength: 30
      description: Key name
    WebhookId:
      name: webhookId
      in: path
      required: true
      schema:
        type: string
      description: Public webhook identifier
    TTL:
      name: ttl
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 2592000
        default: 2592000
      description: Time-to-live in seconds (0 or missing = max 30 days)
    ServiceToken:
      name: token
      in: query
      required: true
      schema:
        type: string
      description: Wallet ID
    RechargeValue:
      name: value
      in: query
      required: true
      schema:
        type: integer
        minimum: 1
      description: Number of credits to add
    ServiceHash:
      name: hash
      in: query
      required: false
      schema:
        type: string
      description: SHA256 hash of the wallet ID. Use instead of `token` when the caller
        should not know the raw wallet ID.
  schemas:
    MyIPInfo:
      type: object
      properties:
        ip:
          type: string
          description: IPv4 address when available. Empty for native IPv6 callers.
        ipv6:
          type: string
          description: Raw IPv6 address when the current caller IP is IPv6.
        isCurrentIpv6:
          type: boolean
          description: True when the incoming client IP header contains an IPv6 address.
        userAgent:
          type: string
        acceptLanguage:
          type: string
        city:
          type: string
        country:
          type: string
        continent:
          type: string
        latitude:
          type: string
        longitude:
          type: string
        region:
          type: string
        regionCode:
          type: string
        timezone:
          type: string
        postalCode:
          type: string
    SummaryRequest:
      type: object
      description: 'Request body for URL metadata analysis.

        The Go proxy normalizes `aiSummary`, forces `proxy=false`, and forwards additional
        fields to the upstream Lambda.

        The Go proxy has a 45s upstream timeout. Page fetch limits, redirect policy,
        robots handling, and private/local URL policy are owned by the upstream scraper
        and are not defined in this repository.

        '
      required:
      - url
      additionalProperties: true
      properties:
        url:
          type: string
          format: uri
          description: Absolute URL to analyze.
          example: https://example.com/articles/launch
        aiSummary:
          type: string
          enum:
          - none
          - short
          - medium
          - long
          default: none
          description: 'Controls AI enrichment level.

            `none` disables AI summary generation and key-fact extraction.

            `short`, `medium`, and `long` enable both and request an approximate summary
            length of 50, 150, and 300 words respectively.

            '
          example: none
      example:
        url: https://example.com/articles/launch
        aiSummary: none
    SummaryResponse:
      type: object
      description: 'Metadata extracted from the requested URL.

        Response fields may vary depending on the analyzed page.

        '
      additionalProperties: true
      example:
        success: true
        data:
          seo:
            title: Example Company - Leading SaaS Platform
            description: Enterprise software for team collaboration
            keywords:
            - saas
            - collaboration
            - enterprise
            canonical: https://example.com
          social:
            x: https://x.com/exampleco
            linkedin: https://linkedin.com/company/exampleco
          contact:
            email: hello@example.com
            phone: +1-555-0123
          technical:
            statusCode: 200
            finalUrl: https://example.com
            originalUrl: https://example.com
            robotsAllowed: true
            isSecure: true
            contentType: text/html; charset=utf-8
          links:
            internal:
              total: 12
              urls:
              - /about
              - /pricing
              - /contact
            external:
              total: 5
              urls:
              - https://github.com/example
              domains:
              - github.com
          ai:
            summary:
              short: Example Company provides cloud-based collaboration software for
                enterprises, offering project management and team communication tools.
              medium: Example Company is a leading SaaS platform offering comprehensive
                team collaboration tools designed for enterprise organizations. The
                platform combines project management, document sharing, and real-time
                communication features to help teams work more efficiently. With over
                10,000 customers worldwide, Example Company has established itself
                as a trusted solution for businesses looking to improve productivity
                and streamline workflows.
              long: Example Company is an innovative SaaS provider that has been transforming
                enterprise collaboration since 2015. Based in San Francisco, the company
                offers a comprehensive suite of tools designed to help teams communicate,
                collaborate, and manage projects more effectively. The platform integrates
                seamlessly with popular business applications and provides enterprise-grade
                security features. Example Company serves organizations of all sizes,
                from startups to Fortune 500 companies, with a particular focus on
                technology, finance, and healthcare sectors. The company's mission
                is to make workplace collaboration simple, efficient, and enjoyable
                for everyone.
              contentLength: 5240
              truncated: false
            keyFacts:
              companyName: Example Company Inc.
              companyType: B2B SaaS
              industry: Enterprise Software
              services:
              - Team Collaboration
              - Project Management
              - Document Sharing
              - Real-time Communication
              targetAudience: Enterprise teams and organizations
              businessModel: Subscription
              headquarters: San Francisco, CA
              foundedYear: 2015
              keyFeatures:
              - Real-time collaboration
              - Enterprise security
              - Third-party integrations
              - Mobile apps
            processingTime: 2340
        timestamp: '2025-06-19T15:54:01.821Z'
    WalletInfo:
      type: object
      properties:
        wallet:
          type: integer
          description: Current credit balance
        created:
          type: string
          format: date-time
          description: Wallet creation timestamp
        hash:
          type: string
          description: SHA256 hash of the wallet token (used for identification in
            webhook payloads)
    CustomerSettings:
      type: object
      properties:
        low_balance_threshold:
          type: integer
          minimum: 0
          description: Wallet balance threshold that triggers low balance notifications.
            Set to 0 to disable notifications.
        low_balance_webhook:
          $ref: '#/components/schemas/LowBalanceWebhookConfig'
        low_balance_email:
          type: string
          format: email
          maxLength: 254
          description: Email address to receive low balance notifications.
    LowBalanceWebhookConfig:
      type: object
      description: Webhook configuration for low balance notifications
      required:
      - url
      properties:
        url:
          type: string
          format: uri
          description: HTTPS URL to receive webhook when balance falls below threshold.
            Must be a valid HTTPS URL.
        headers:
          type: object
          additionalProperties:
            type: string
          description: Optional custom headers to include in the webhook request
        format:
          type: string
          enum:
          - ''
          - slack
          - discord
          - teams
          - telegram
          - pagerduty
          - custom
          description: "Native payload format for the webhook. When set, the payload\
            \ is transformed:\n- `slack` \u2014 `{\"text\": \"...\"}` format\n- `discord`\
            \ \u2014 `{\"content\": \"...\"}` format\n- `teams` \u2014 `{\"text\"\
            : \"...\"}` Adaptive Card text\n- `telegram` \u2014 `{\"chat_id\": \"\
            ...\", \"text\": \"...\", \"parse_mode\": \"HTML\"}` (requires `options.chat_id`)\n\
            - `pagerduty` \u2014 Events API v2 trigger payload (requires `options.routing_key`)\n\
            - `custom` \u2014 user-defined JSON template with placeholders (requires\
            \ `template` field)\n"
        template:
          type: object
          description: JSON template when `format` is `custom`. Supports `{{wallet}}`,
            `{{threshold}}`, `{{token_hash}}` placeholders.
          additionalProperties: true
        options:
          type: object
          additionalProperties:
            type: string
          description: Format-specific options (e.g., `chat_id` for Telegram, `routing_key`
            for PagerDuty)
    LogEntry:
      type: object
      properties:
        id:
          type: string
        method:
          type: string
        path:
          type: string
          description: Full request path including query parameters
        endpoint:
          type: string
          description: API category (e.g. `kv`, `token`, `webhook`, `service`, `manage`)
        status_code:
          type: integer
          description: HTTP response status code
        response_time_ms:
          type: integer
          description: Response time in milliseconds
        error:
          type: string
        timestamp:
          type: string
          format: date-time
        expiration:
          type: string
          format: date-time
        cost:
          type: integer
        balance:
          type: integer
    LogsResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: '#/components/schemas/LogEntry'
        n:
          type: integer
          description: Number of log entries returned
    CallInboundPayload:
      type: object
      required:
      - to
      properties:
        externalMessageId:
          type: string
          description: Message identifier from the inbound mail provider
        receivedAt:
          type: string
          description: ISO-8601 timestamp when the message was received
        from:
          type: object
          description: Sender information
          additionalProperties: true
        to:
          type: array
          description: Recipient list from the inbound mail provider
          items:
            type: object
            required:
            - email
            properties:
              email:
                type: string
              name:
                type: string
        cc:
          type: array
          description: CC recipients from the inbound mail provider
          items:
            type: object
            additionalProperties: true
        subject:
          type: string
        text:
          type: string
        html:
          type: string
        headers:
          type: object
          additionalProperties: true
        attachments:
          type: array
          description: 'Attachment metadata from the inbound mail worker. When attachment
            storage is enabled,

            generated download URLs default to 300 seconds and `downloadUrlExpiresAt`
            marks URL

            expiry. After `downloadUrlExpiresAt`, attachment availability is not guaranteed.

            '
          items:
            type: object
            additionalProperties: true
        url:
          type: string
        provider:
          type: string
        raw:
          type: object
          additionalProperties: true
    ScheduledWebhookPayload:
      type: object
      required:
      - type
      - webhookId
      - scheduledFor
      - executedAt
      - walletHash
      description: 'Outbound payload delivered to the configured webhook URL for scheduled
        webhook runs.

        This is distinct from the email-style payload used by `POST /webhook/call`.

        '
      properties:
        type:
          type: string
          enum:
          - scheduled_webhook_run
        webhookId:
          type: string
          description: Public webhook identifier. Defaults to `default` when omitted
            during webhook creation.
          example: default
        scheduledFor:
          type: string
          format: date-time
          description: Scheduled occurrence time encoded in the Cloud Tasks payload.
          example: '2026-04-22T12:05:00Z'
        executedAt:
          type: string
          format: date-time
          description: Actual execution time of this scheduled run.
          example: '2026-04-22T12:05:01Z'
        walletHash:
          type: string
          description: SHA-256 hash of the wallet token that owns the webhook and
            generated the delivery.
          example: asdsadsa
      additionalProperties: false
    CallResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Whether the webhook was successfully called
        message:
          type: string
          description: The target address
    ScheduledWebhookRunRequest:
      type: object
      required:
      - mailboxId
      - generation
      - scheduledFor
      properties:
        mailboxId:
          type: string
          description: Opaque mailbox identifier to execute
          example: r_sched123
        generation:
          type: integer
          format: int64
          minimum: 1
          description: Schedule generation used to invalidate stale queued tasks
        scheduledFor:
          type: string
          format: date-time
          description: Scheduled occurrence time encoded in the task payload for idempotency
          example: '2026-04-22T12:05:00Z'
      additionalProperties: false
    ScheduledWebhookRunResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
      - success
      additionalProperties: false
    TestResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Whether the test webhook was successfully delivered
        message:
          type: string
          description: Confirmation message
    WebhookCreateReplaceRequest:
      type: object
      required:
      - url
      properties:
        webhookId:
          type: string
          maxLength: 30
          pattern: ^[A-Za-z0-9_-]+$
          description: Public webhook identifier used for management endpoints. Defaults
            to `default` when omitted. `call` is reserved and cannot be used.
        url:
          type: string
          format: uri
          description: HTTPS callback URL on a public host. Delivery has a 10s timeout,
            follows at most 10 redirects, and rejects redirect targets that are not
            HTTPS public hosts.
        headers:
          type: object
          additionalProperties:
            type: string
          description: Optional custom headers to include in the callback request
        format:
          type: string
          enum:
          - ''
          - slack
          - discord
          - teams
          - telegram
          - pagerduty
          - custom
          description: "Native payload format. When set, the webhook body is transformed\
            \ into the platform's native message format instead of forwarding the\
            \ raw email payload.\n- `slack` \u2014 `{\"text\": \"...\"}` with bold\
            \ subject and From\n- `discord` \u2014 `{\"content\": \"...\"}` with bold\
            \ subject and From\n- `teams` \u2014 `{\"text\": \"...\"}` Adaptive Card\
            \ text\n- `telegram` \u2014 `{\"chat_id\": \"...\", \"text\": \"...\"\
            , \"parse_mode\": \"HTML\"}` (requires `options.chat_id`)\n- `pagerduty`\
            \ \u2014 Events API v2 trigger payload (requires `options.routing_key`)\n\
            - `custom` \u2014 user-defined JSON template with placeholders (requires\
            \ `template` field)\n"
        template:
          type: object
          description: 'JSON template used when `format` is `custom`. Supports placeholders:

            - Dot notation: `{{from.name}}`, `{{subject}}`

            - Array index: `{{attachments[0].filename}}`, `{{attachments[-1].filename}}`
            (negative = from end)

            - Fallback chain: `{{text|html}}` (first non-empty wins)

            - Literal fallback: `{{sender|"unknown"}}`

            Max 2048 bytes, max 5 nesting levels.

            '
          additionalProperties: true
        options:
          type: object
          additionalProperties:
            type: string
          description: "Format-specific options (max 10 keys, values up to 500 chars\
            \ each).\n- `chat_id` \u2014 required for `telegram` format\n- `routing_key`\
            \ \u2014 required for `pagerduty` format\n"
        includeAttachments:
          type: boolean
          default: true
          description: Whether to include email attachments in the webhook payload.
            If false, attachments are stripped from the payload. When email contains
            attachments and inclusion is enabled, the call costs 5 credits; otherwise
            it costs 2 credits. Not allowed when `schedule` is configured.
        schedule:
          description: Scheduled delivery config. Mutually exclusive with mailbox
            delivery fields such as `includeAttachments`.
          $ref: '#/components/schemas/WebhookScheduleRequest'
      additionalProperties: false
    WebhookPatchRequest:
      type: object
      description: 'Partial update payload for `PATCH /webhook/{webhookId}`.

        Only provided fields are updated.

        `headers`, `options`, and `template` replace the full field value (no deep
        merge).

        '
      properties:
        url:
          type: string
          format: uri
          description: HTTPS callback URL on a public host. Delivery has a 10s timeout,
            follows at most 10 redirects, and rejects redirect targets that are not
            HTTPS public hosts.
        headers:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Set `{}` to clear all headers.
        format:
          type: string
          enum:
          - ''
          - slack
          - discord
          - teams
          - telegram
          - pagerduty
          - custom
        template:
          type: object
          nullable: true
          additionalProperties: true
          description: Set `null` to remove template.
        options:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Set `{}` to clear all options.
        includeAttachments:
          type: boolean
          description: Mailbox-delivery setting. Not allowed while scheduling is enabled.
        schedule:
          allOf:
          - $ref: '#/components/schemas/WebhookSchedulePatchRequest'
          nullable: true
          description: Scheduled delivery patch. Set `null` to convert the webhook
            back to mailbox mode.
      additionalProperties: false
    WebhookScheduleRequest:
      type: object
      description: The first scheduled run must occur within 30 days, and the interval
        between runs must not exceed 30 days. Active scheduled runs cost 2 credits
        each; if the wallet has insufficient credits, delivery is skipped, the run
        is recorded as failure, and the next run is still enqueued.
      required:
      - cron
      - timezone
      properties:
        cron:
          type: string
          pattern: ^\\S+\\s+\\S+\\s+\\S+\\s+\\S+\\s+\\S+$
          description: 5-field cron expression (`minute hour day month weekday`).
            The first run must occur within 30 days, and the interval between runs
            must not exceed 30 days.
          example: '*/15 * * * *'
        timezone:
          type: string
          description: IANA timezone name used to evaluate cron
          example: Europe/Rome
        active:
          type: boolean
          default: true
          description: Whether scheduled delivery is active
      additionalProperties: false
    WebhookSchedulePatchRequest:
      type: object
      properties:
        cron:
          type: string
          pattern: ^\\S+\\s+\\S+\\s+\\S+\\s+\\S+\\s+\\S+$
        timezone:
          type: string
        active:
          type: boolean
      additionalProperties: false
    WebhookScheduleResponse:
      type: object
      properties:
        cron:
          type: string
        timezone:
          type: string
        active:
          type: boolean
        nextRunAt:
          type: string
          format: date-time
        lastRunAt:
          type: string
          format: date-time
        lastStatus:
          type: string
          enum:
          - success
          - failure
        lastError:
          type: string
      required:
      - cron
      - timezone
      - active
      additionalProperties: false
    WebhookResponse:
      type: object
      properties:
        webhookId:
          type: string
          maxLength: 30
          pattern: ^[A-Za-z0-9_-]+$
          description: Public webhook identifier used for management endpoints
        webhook:
          type: string
          format: uri
          description: Configured HTTPS callback URL
        headers:
          type: object
          additionalProperties:
            type: string
          description: Custom headers
        format:
          type: string
          description: Native format, if configured (e.g. `slack`, `telegram`, `custom`)
        template:
          type: object
          description: Custom template object (only present when format is `custom`)
        options:
          type: object
          additionalProperties:
            type: string
          description: Format options with sensitive values redacted
        includeAttachments:
          type: boolean
          description: Whether attachments are included in webhook payload (true =
            include, false = stripped). Returned only for mailbox-style webhooks;
            omitted for scheduled webhooks.
        schedule:
          $ref: '#/components/schemas/WebhookScheduleResponse'
        email:
          type: string
          description: Opaque mailbox address for this webhook (<mailboxId>@hook.echovalue.dev).
            Returned only for mailbox-style webhooks; omitted for scheduled webhooks.
        hash:
          type: string
          description: SHA256 hash of the wallet token
    WebhookListResponse:
      type: object
      properties:
        webhooks:
          type: array
          items:
            $ref: '#/components/schemas/WebhookResponse'
    DNSLookupRequest:
      type: object
      description: 'Request body for DNS lookup and enrichment.

        The payload is forwarded as-is to the upstream Lambda endpoint after JSON
        validation.

        The Go proxy has a 45s upstream timeout. Limits such as max domains and default
        resolver list are owned by the upstream Lambda and are not defined in this
        repository.

        '
      required:
      - domains
      additionalProperties: false
      properties:
        domains:
          type: array
          minItems: 1
          items:
            type: string
          description: Domain names or IP addresses. No max item count is enforced
            by the Go proxy.
        recordTypes:
          type: array
          items:
            type: string
            enum:
            - A
            - AAAA
            - MX
            - CNAME
            - TXT
            - NS
            - PTR
            - SOA
            - CAA
            - SRV
        checkPropagation:
          type: boolean
          default: false
        propagationServers:
          type: array
          items:
            type: string
        performReverseLookup:
          type: boolean
          default: true
        enableEnrichment:
          type: boolean
          default: true
        enableSslInspection:
          type: boolean
          default: true
        timeout:
          type: integer
          minimum: 1000
          maximum: 60000
          default: 5000
          description: Upstream DNS lookup timeout option in milliseconds. The Go
            proxy also has a 45s total upstream request timeout.
        maxRetries:
          type: integer
          minimum: 0
          maximum: 10
          default: 3
        retryDelay:
          type: integer
          minimum: 0
          maximum: 100000
          default: 1000
        includeMetadata:
          type: boolean
          default: false
    DNSLookupResponse:
      type: object
      required:
      - summary
      - results
      description: 'Actor-style DNS lookup response returned by the upstream Lambda.

        It contains an aggregate `summary` plus one result entry per requested domain
        or IP.

        '
      additionalProperties: false
      properties:
        summary:
          $ref: '#/components/schemas/DNSLookupSummary'
        results:
          type: array
          description: One item per requested domain or IP address.
          items:
            $ref: '#/components/schemas/DNSLookupDomainResult'
      example:
        summary:
          totalDomains: 1
          successfulLookups: 1
          failedLookups: 0
          recordTypes:
          - A
          - MX
          - TXT
          propagationCheckEnabled: false
        results:
        - domain: example.com
          lookupResult:
            domain: example.com
            timestamp: '2026-04-22T09:15:00.000Z'
            records:
              A:
              - type: A
                address: 93.184.216.34
                ttl: 3600
              MX:
              - type: MX
                exchange: .
                priority: 0
              TXT:
              - type: TXT
                entries:
                - v=spf1 -all
                ttl: 1800
            mx_provider: null
            spf_valid: true
            spf_strict: true
            dmarc_policy: reject
            has_dkim: false
            email_security_score: 85
            ssl_certificate_expires_at: '2026-07-20T12:00:00.000Z'
            ssl_days_until_expiry: 89
            warnings:
            - No DKIM records detected
            recommendations:
            - Configure DKIM signing for email authentication
            metadata:
              queryTime: 124
              totalRecords: 3
    DNSLookupSummary:
      type: object
      required:
      - totalDomains
      - successfulLookups
      - failedLookups
      - recordTypes
      - propagationCheckEnabled
      additionalProperties: false
      properties:
        totalDomains:
          type: integer
        successfulLookups:
          type: integer
        failedLookups:
          type: integer
        recordTypes:
          type: array
          items:
            type: string
            enum:
            - A
            - AAAA
            - MX
            - CNAME
            - TXT
            - NS
            - PTR
            - SOA
            - CAA
            - SRV
        propagationCheckEnabled:
          type: boolean
    DNSLookupDomainResult:
      type: object
      required:
      - domain
      - lookupResult
      additionalProperties: false
      properties:
        domain:
          type: string
          description: Requested domain or IP address.
        lookupResult:
          $ref: '#/components/schemas/DNSLookupResult'
        propagationResults:
          type: array
          description: Present only when `checkPropagation=true`.
          items:
            $ref: '#/components/schemas/DNSPropagationResult'
    DNSLookupResult:
      type: object
      required:
      - domain
      - timestamp
      - records
      additionalProperties: true
      properties:
        domain:
          type: string
        timestamp:
          type: string
          format: date-time
        records:
          $ref: '#/components/schemas/DNSRecordsByType'
        reverseLookup:
          type: object
          required:
          - hostnames
          - responseTime
          additionalProperties: false
          properties:
            hostnames:
              type: array
              items:
                type: string
            responseTime:
              type: integer
              description: Milliseconds spent in PTR lookup.
        mx_provider:
          type: string
          nullable: true
          description: Best-effort provider name inferred from MX records.
        spf_valid:
          type: boolean
        spf_strict:
          type: boolean
        dmarc_policy:
          type: string
          enum:
          - none
          - quarantine
          - reject
        has_dkim:
          type: boolean
        email_security_score:
          type: number
          description: Enrichment score from 0 to 100.
        ssl_certificate_expires_at:
          type: string
          format: date-time
        ssl_days_until_expiry:
          type: integer
          nullable: true
        warnings:
          type: array
          description: Aggregated warnings from SSL and email-security analysis.
          items:
            type: string
        recommendations:
          type: array
          description: Actionable follow-up items derived from enrichment.
          items:
            type: string
        enrichment:
          type: object
          additionalProperties: true
          description: Detailed enrichment payload from the upstream service.
        metadata:
          type: object
          additionalProperties: false
          required:
          - queryTime
          - totalRecords
          properties:
            queryTime:
              type: integer
              description: End-to-end lookup time in milliseconds.
            totalRecords:
              type: integer
        errors:
          type: object
          additionalProperties:
            type: string
          description: Per-record-type lookup errors when some queries fail.
    DNSRecordsByType:
      type: object
      additionalProperties: false
      properties:
        A:
          type: array
          items:
            $ref: '#/components/schemas/DNSARecord'
        AAAA:
          type: array
          items:
            $ref: '#/components/schemas/DNSAAAARecord'
        MX:
          type: array
          items:
            $ref: '#/components/schemas/DNSMXRecord'
        CNAME:
          type: array
          items:
            $ref: '#/components/schemas/DNSCNAMERecord'
        TXT:
          type: array
          items:
            $ref: '#/components/schemas/DNSTXTRecord'
        NS:
          type: array
          items:
            $ref: '#/components/schemas/DNSNSRecord'
        PTR:
          type: array
          items:
            $ref: '#/components/schemas/DNSPTRRecord'
        SOA:
          type: array
          items:
            $ref: '#/components/schemas/DNSSOARecord'
        CAA:
          type: array
          items:
            $ref: '#/components/schemas/DNSCAARecord'
        SRV:
          type: array
          items:
            $ref: '#/components/schemas/DNSSRVRecord'
    DNSRecordBase:
      type: object
      required:
      - type
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
          - A
          - AAAA
          - MX
          - CNAME
          - TXT
          - NS
          - PTR
          - SOA
          - CAA
          - SRV
        ttl:
          type: integer
    DNSARecord:
      allOf:
      - $ref: '#/components/schemas/DNSRecordBase'
      - type: object
        required:
        - type
        - address
        additionalProperties: false
        properties:
          type:
            type: string
            enum:
            - A
          address:
            type: string
    DNSAAAARecord:
      allOf:
      - $ref: '#/components/schemas/DNSRecordBase'
      - type: object
        required:
        - type
        - address
        additionalProperties: false
        properties:
          type:
            type: string
            enum:
            - AAAA
          address:
            type: string
    DNSMXRecord:
      allOf:
      - $ref: '#/components/schemas/DNSRecordBase'
      - type: object
        required:
        - type
        - exchange
        - priority
        additionalProperties: false
        properties:
          type:
            type: string
            enum:
            - MX
          exchange:
            type: string
          priority:
            type: integer
    DNSCNAMERecord:
      allOf:
      - $ref: '#/components/schemas/DNSRecordBase'
      - type: object
        required:
        - type
        - value
        additionalProperties: false
        properties:
          type:
            type: string
            enum:
            - CNAME
          value:
            type: string
    DNSTXTRecord:
      allOf:
      - $ref: '#/components/schemas/DNSRecordBase'
      - type: object
        required:
        - type
        - entries
        additionalProperties: false
        properties:
          type:
            type: string
            enum:
            - TXT
          entries:
            type: array
            items:
              type: string
    DNSNSRecord:
      allOf:
      - $ref: '#/components/schemas/DNSRecordBase'
      - type: object
        required:
        - type
        - value
        additionalProperties: false
        properties:
          type:
            type: string
            enum:
            - NS
          value:
            type: string
    DNSPTRRecord:
      allOf:
      - $ref: '#/components/schemas/DNSRecordBase'
      - type: object
        required:
        - type
        - value
        additionalProperties: false
        properties:
          type:
            type: string
            enum:
            - PTR
          value:
            type: string
    DNSSOARecord:
      allOf:
      - $ref: '#/components/schemas/DNSRecordBase'
      - type: object
        required:
        - type
        - nsname
        - hostmaster
        - serial
        - refresh
        - retry
        - expire
        - minttl
        additionalProperties: false
        properties:
          type:
            type: string
            enum:
            - SOA
          nsname:
            type: string
          hostmaster:
            type: string
          serial:
            type: integer
          refresh:
            type: integer
          retry:
            type: integer
          expire:
            type: integer
          minttl:
            type: integer
    DNSCAARecord:
      allOf:
      - $ref: '#/components/schemas/DNSRecordBase'
      - type: object
        required:
        - type
        - flags
        - tag
        - value
        additionalProperties: false
        properties:
          type:
            type: string
            enum:
            - CAA
          flags:
            type: integer
          tag:
            type: string
          value:
            type: string
    DNSSRVRecord:
      allOf:
      - $ref: '#/components/schemas/DNSRecordBase'
      - type: object
        required:
        - type
        - priority
        - weight
        - port
        - target
        additionalProperties: false
        properties:
          type:
            type: string
            enum:
            - SRV
          priority:
            type: integer
          weight:
            type: integer
          port:
            type: integer
          target:
            type: string
    DNSPropagationResult:
      type: object
      required:
      - domain
      - recordType
      - timestamp
      - servers
      - isPropagated
      - consistencyPercentage
      additionalProperties: false
      properties:
        domain:
          type: string
        recordType:
          type: string
          enum:
          - A
          - AAAA
          - MX
          - CNAME
          - TXT
          - NS
          - PTR
          - SOA
          - CAA
          - SRV
        timestamp:
          type: string
          format: date-time
        servers:
          type: object
          additionalProperties:
            type: object
            required:
            - records
            - responseTime
            additionalProperties: false
            properties:
              records:
                type: array
                items:
                  type: object
                  additionalProperties: true
              responseTime:
                type: integer
              error:
                type: string
        isPropagated:
          type: boolean
        consistencyPercentage:
          type: number
  responses:
    Unauthorized:
      description: Missing or invalid x-token header (min 10 chars)
    PaymentRequired:
      description: Wallet has insufficient credits for the requested operation.
    NotFound:
      description: Key not found or expired
    BadRequest:
      description: Invalid parameters
paths:
  /kv/{bucket}/{key}:
    servers:
    - url: https://api.echovalue.dev
      description: Production - Consolidated API
    get:
      tags:
      - KV API
      operationId: getKVValue
      summary: Get value
      description: Returns the stored value for the given bucket/key. Costs 1 credit.
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      - $ref: '#/components/parameters/Bucket'
      - $ref: '#/components/parameters/Key'
      responses:
        '200':
          description: The stored value
          content:
            text/plain:
              schema:
                type: string
          headers:
            x-balance:
              $ref: '#/components/headers/XBalance'
            x-cost:
              $ref: '#/components/headers/XCost'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
      - KV API
      operationId: storeKVValue
      summary: Store value
      description: Stores a raw body value with TTL. Costs 1 credit.
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      - $ref: '#/components/parameters/Bucket'
      - $ref: '#/components/parameters/Key'
      - $ref: '#/components/parameters/TTL'
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              maxLength: 1000
      responses:
        '200':
          description: Value stored successfully
          content:
            text/plain:
              schema:
                type: string
                example: OK
          headers:
            x-balance:
              $ref: '#/components/headers/XBalance'
            x-cost:
              $ref: '#/components/headers/XCost'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/PaymentRequired'
    delete:
      tags:
      - KV API
      operationId: deleteKVValue
      summary: Delete key
      description: Deletes the key from the bucket. Costs 1 credit.
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      - $ref: '#/components/parameters/Bucket'
      - $ref: '#/components/parameters/Key'
      responses:
        '200':
          description: Key deleted
          content:
            text/plain:
              schema:
                type: string
                example: OK
          headers:
            x-balance:
              $ref: '#/components/headers/XBalance'
            x-cost:
              $ref: '#/components/headers/XCost'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/PaymentRequired'
  /token:
    servers:
    - url: https://api.echovalue.dev
      description: Production - Consolidated API
    get:
      tags:
      - Token API
      operationId: getWalletInfo
      summary: Get wallet info
      description: Returns wallet JSON. Costs 1 credit.
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      responses:
        '200':
          description: Wallet info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletInfo'
          headers:
            x-balance:
              $ref: '#/components/headers/XBalance'
            x-cost:
              $ref: '#/components/headers/XCost'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/PaymentRequired'
    post:
      tags:
      - Token API
      operationId: createWallet
      summary: Create wallet
      description: "- `token=new` \u2014 creates a new wallet with DEFAULT_WALLET\
        \ credits, returns wallet ID\n"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - token
              properties:
                token:
                  type: string
                  enum:
                  - new
                  description: Action to perform
      responses:
        '200':
          description: Wallet ID string
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: Bad request
  /recharge:
    servers:
    - url: https://api.echovalue.dev
      description: Production - Token API
    get:
      tags:
      - Token API
      operationId: getRechargeLink
      summary: Get recharge link
      description: Returns a Stripe checkout link with the wallet hash in `client_reference_id`.
        This endpoint is free and does not deduct wallet credits.
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      - name: amount
        in: query
        required: false
        schema:
          type: string
          enum:
          - '1'
          - '3'
          default: '1'
        description: Recharge tier
      responses:
        '200':
          description: Stripe checkout URL
          content:
            text/plain:
              schema:
                type: string
          headers:
            x-balance:
              $ref: '#/components/headers/XBalance'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          description: Method not allowed
  /token/logs:
    servers:
    - url: https://api.echovalue.dev
      description: Production - Consolidated API
    get:
      tags:
      - Token API
      operationId: getWalletLogs
      summary: Get request logs
      description: Returns the latest `n` log entries. This endpoint is free and does
        not deduct wallet balance.
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      - name: n
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 5
        description: Number of log entries to return
      - name: type
        in: query
        required: false
        schema:
          type: string
        description: 'Optional endpoint filter. The implementation forwards this value
          to log storage as-is.

          Common values include `kv`, `token`, `settings`, `webhook`, `url-to-metadata`,
          `myip`, `service`, and `manage`.

          '
      responses:
        '200':
          description: Log entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogsResponse'
          headers:
            x-cost:
              $ref: '#/components/headers/XCost'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /token/settings:
    servers:
    - url: https://api.echovalue.dev
      description: Production - Consolidated API
    get:
      tags:
      - Token API
      operationId: getWalletSettings
      summary: Get low balance settings
      description: Returns the current low balance notification settings. Costs 1
        credit.
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      responses:
        '200':
          description: Low balance settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerSettings'
          headers:
            x-balance:
              $ref: '#/components/headers/XBalance'
            x-cost:
              $ref: '#/components/headers/XCost'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/PaymentRequired'
    put:
      tags:
      - Token API
      operationId: updateWalletSettings
      summary: Update low balance settings
      description: 'Configures low balance notifications. When wallet balance falls
        below the threshold,

        a notification is sent to the configured webhook URL and/or email.

        Notifications are sent at most once per low-balance incident (i.e. the cooldown
        resets when the balance rises back above the threshold).

        Costs 1 credit.

        '
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerSettings'
      responses:
        '200':
          description: Settings updated successfully
          content:
            text/plain:
              schema:
                type: string
                example: OK
          headers:
            x-balance:
              $ref: '#/components/headers/XBalance'
            x-cost:
              $ref: '#/components/headers/XCost'
        '400':
          description: Invalid webhook URL (must be HTTPS) or invalid threshold value
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/PaymentRequired'
  /webhook:
    servers:
    - url: https://api.echovalue.dev
      description: Production - Consolidated API
    get:
      tags:
      - Webhook API
      operationId: listWebhooks
      summary: List webhooks
      description: Returns all configured webhooks for this wallet. Costs 1 credit.
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      responses:
        '200':
          description: Webhook list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookListResponse'
          headers:
            x-balance:
              $ref: '#/components/headers/XBalance'
            x-cost:
              $ref: '#/components/headers/XCost'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/PaymentRequired'
    post:
      tags:
      - Webhook API
      operationId: createWebhook
      summary: Create webhook
      description: 'Creates a new webhook. Costs 1 credit.

        URL must be HTTPS pointing to a public host.

        Optional `schedule` enables recurring delivery using a 5-field cron expression
        plus IANA timezone.

        A webhook is either mailbox-triggered or scheduled, never both.

        When `schedule` is present, mailbox delivery is disabled and `includeAttachments`
        is not allowed.

        Scheduled webhooks must start within 30 days, and the interval between runs
        must not exceed 30 days.

        Each scheduled run costs 2 credits.

        '
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookCreateReplaceRequest'
      responses:
        '200':
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookResponse'
          headers:
            x-balance:
              $ref: '#/components/headers/XBalance'
            x-cost:
              $ref: '#/components/headers/XCost'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '409':
          description: Webhook ID already exists for this wallet
        '500':
          description: Internal server error
  /webhook/{webhookId}:
    servers:
    - url: https://api.echovalue.dev
      description: Production - Consolidated API
    get:
      tags:
      - Webhook API
      operationId: getWebhook
      summary: Get webhook by ID
      description: Returns a specific webhook by `webhookId`. Costs 1 credit.
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      - $ref: '#/components/parameters/WebhookId'
      responses:
        '200':
          description: Webhook found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookResponse'
          headers:
            x-balance:
              $ref: '#/components/headers/XBalance'
            x-cost:
              $ref: '#/components/headers/XCost'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '404':
          description: Webhook not found
    put:
      tags:
      - Webhook API
      operationId: replaceWebhook
      summary: Replace webhook
      description: 'Replaces the full webhook document for the specified `webhookId`.
        Costs 1 credit.

        `url` is required.

        Include `schedule` to replace the scheduling configuration as part of the
        same request.

        A webhook is either mailbox-triggered or scheduled, never both.

        When `schedule` is present, mailbox delivery is disabled and `includeAttachments`
        is not allowed.

        Scheduled webhooks must start within 30 days, and the interval between runs
        must not exceed 30 days.

        '
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      - $ref: '#/components/parameters/WebhookId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookCreateReplaceRequest'
      responses:
        '200':
          description: Webhook replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookResponse'
          headers:
            x-balance:
              $ref: '#/components/headers/XBalance'
            x-cost:
              $ref: '#/components/headers/XCost'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '404':
          description: Webhook not found
        '500':
          description: Internal server error
    patch:
      tags:
      - Webhook API
      operationId: patchWebhook
      summary: Patch webhook
      description: 'Updates only provided fields on a webhook. Costs 1 credit.

        Set `schedule: null` to remove scheduling. Patch values replace the full schedule
        fields that are provided.

        A webhook is either mailbox-triggered or scheduled, never both.

        `includeAttachments` is only valid in mailbox mode.

        Scheduled webhooks must start within 30 days, and the interval between runs
        must not exceed 30 days.

        '
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      - $ref: '#/components/parameters/WebhookId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookPatchRequest'
      responses:
        '200':
          description: Webhook updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookResponse'
          headers:
            x-balance:
              $ref: '#/components/headers/XBalance'
            x-cost:
              $ref: '#/components/headers/XCost'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '404':
          description: Webhook not found
        '500':
          description: Internal server error
    delete:
      tags:
      - Webhook API
      operationId: deleteWebhook
      summary: Delete webhook
      description: Removes a specific webhook. Costs 1 credit.
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      - $ref: '#/components/parameters/WebhookId'
      responses:
        '200':
          description: Webhook deleted
          content:
            text/plain:
              schema:
                type: string
                example: OK
          headers:
            x-balance:
              $ref: '#/components/headers/XBalance'
            x-cost:
              $ref: '#/components/headers/XCost'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '404':
          description: No webhook configured
  /webhook/{webhookId}/test:
    servers:
    - url: https://api.echovalue.dev
      description: Production - Consolidated API
    post:
      tags:
      - Webhook Test API
      operationId: testWebhook
      summary: Test a specific webhook
      description: 'Sends a dummy payload to the specified webhook URL. Costs 1 credit.

        '
      security:
      - TokenAuth: []
      parameters:
      - $ref: '#/components/parameters/TokenHeader'
      - $ref: '#/components/parameters/WebhookId'
      responses:
        '200':
          description: Test call processed (check `success` field for delivery status)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestResponse'
              examples:
                success:
                  summary: Delivery success
                  value:
                    success: true
                    message: test webhook delivered
                failure:
                  summary: Delivery failure
                  value:
                    success: false
                    message: 'webhook call failed: context deadline exceeded (Client.Timeout
                      exceeded while awaiting headers)'
          headers:
            x-balance:
