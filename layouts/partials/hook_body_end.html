<script defer>
  // Patch TOC controller click() to match by ID instead of object reference.
  // Fixes bug where clicking H3 items (e.g. "HTTP Request") expands all menu items.
  // See: https://github.com/bep/docuapi/issues/...
  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
      var tocEls = document.querySelectorAll('[x-data="tocController"]');
      tocEls.forEach(function(tocEl) {
        if (tocEl.__x) {
          var tocData = tocEl.__x.getUnobservedData();

          var setOpenRecursive = function(row, shouldOpen) {
            if (!row.sub) {
              return false;
            }
            var isOpen = false;
            row.sub.forEach(function(rowsub) {
              rowsub.open = shouldOpen(rowsub);
              rowsub.active = rowsub.open;
              rowsub.open = rowsub.open || setOpenRecursive(rowsub, shouldOpen);
              if (rowsub.open) {
                isOpen = true;
              }
            });
            row.active_parent = isOpen;
            isOpen = isOpen || shouldOpen(row);
            row.open = isOpen;
            row.active = shouldOpen(row);
            return isOpen;
          };

          tocData.click = function(row) {
            this.rows.forEach(function(row2) {
              setOpenRecursive(row2, function(row3) {
                return row3.id && row.id && row3.id === row.id;
              });
            });
          };
        }
      });
    }, 500);
  });
</script>
